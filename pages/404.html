---
layout: default
title: "Page not found"
permalink: /404.html
---

<div class="error-page">
  <div class="error-content">
    <div class="error-code">
      <span class="error-4">4</span><span class="error-0">0</span><span class="error-4">4</span>
    </div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>

    <div class="terminal-window" style="max-width:480px;margin:2rem auto;">
      <div class="terminal-header">
        <div class="terminal-dots" aria-hidden="true">
          <div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div>
        </div>
        <div class="terminal-title">bash</div>
      </div>
      <div class="terminal-body">
        <div style="color:var(--accent-red);">$ curl {{ page.url }}</div>
        <div style="color:var(--text-secondary);">HTTP/1.1 404 Not Found</div>
        <div style="color:var(--text-muted);">Error: resource not found on this server</div>
      </div>
    </div>

    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem;">
      <a href="{{ '/' | relative_url }}" class="btn btn-primary">
        <i class="fas fa-home" aria-hidden="true"></i> Go Home
      </a>
      <a href="{{ '/archives' | relative_url }}" class="btn btn-secondary">
        <i class="fas fa-list" aria-hidden="true"></i> Browse Posts
      </a>
    </div>
  </div>
</div>

<style>
.error-page {
  min-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem;
  text-align: center;
}
.error-content { max-width: 600px; margin: 0 auto; }
.error-code {
  font-size: clamp(5rem, 15vw, 10rem);
  font-weight: 900;
  font-family: var(--font-mono);
  line-height: 1;
  margin-bottom: 1.5rem;
  display: flex;
  justify-content: center;
  gap: 0.1em;
}
.error-4 {
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.error-0 { color: var(--accent-red); }
.error-title { font-size: 1.8rem; margin-bottom: 1rem; color: var(--text-primary); }
.error-desc  { color: var(--text-secondary); font-size: 1.05rem; margin-bottom: 0; }
</style>
