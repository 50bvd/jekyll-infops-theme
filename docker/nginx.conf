server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache assets statiques
    location ~* \.(css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # Feed & sitemap : pas de cache
    location ~* \.(xml|json)$ {
        expires     1h;
        add_header  Cache-Control "public, must-revalidate";
    }

    # Headers de sécurité
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection       "1; mode=block"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy permissive (ajustez selon vos besoins)
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src  'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://utteranc.es; \
         style-src   'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; \
         font-src    'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; \
         img-src     'self' data: https:; \
         frame-src   https://utteranc.es; \
         connect-src 'self';" always;

    # Fallback Jekyll — pages sans extension
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # 404 custom Jekyll
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
